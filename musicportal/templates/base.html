
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"> 
    <title>{% block title %}Музыкальный портал{% endblock %}</title>
    {% load static %}
    {% load music_tags %}
    <link rel="stylesheet" type="text/css" href="{% static 'homepage/css/styles.css' %}">
    <link rel="shortcut icon" href="{% static 'homepage/images/note.png' %}" type="image/x-icon">
</head>
<body>
    <div class="header">
        <ul class="mainmenu">
            <li class="logo"><a href="{% url 'main' %}"><div class="logo"></div></a></li>
            {% for item in mainmenu %}
            <li>
                <a href="{% url item.url_name %}">{{ item.title }}</a>
            </li>
            {% endfor %}
            {% if user.is_authenticated %}
            <li class="last">
            <a href="{% url 'profile' username=user.username %}">Профиль {{ user.username }}</a> |
            <a href="{% url 'users:logout' %}">Выйти</a>
            </li>
            {% else %}
             <li class="last">
                 <a href="{% url 'users:login' %}">Войти</a> |
                 <a href="#">Регистрация</a>
    </li>
{% endif %}

 </ul>
 <div class="clear"></div>
 </div>

        </ul>
    </div>
    <div class="content">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
